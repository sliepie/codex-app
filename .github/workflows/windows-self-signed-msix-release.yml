name: Windows Self-Signed MSIX Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: GitHub release tag to publish assets to, for example v26.429.20946
        required: true
        type: string
      package_version:
        description: Four-part MSIX version, for example 26.429.20946.0
        required: true
        type: string
      package_architecture:
        description: MSIX processor architecture for the manifest
        required: true
        type: choice
        options:
          - x64
          - arm64
      package_name:
        description: MSIX package identity name
        required: true
        type: string
      package_publisher:
        description: MSIX publisher subject matching the self-signed PFX, for example CN=Codex Local Test
        required: true
        type: string
      appinstaller_uri:
        description: Stable public URL where Codex.appinstaller will be hosted
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-sign-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate self-signed signing inputs
        shell: pwsh
        env:
          SELF_SIGNED_PFX_BASE64: ${{ secrets.SELF_SIGNED_PFX_BASE64 }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SELF_SIGNED_PFX_BASE64)) {
            throw 'Missing required secret: SELF_SIGNED_PFX_BASE64'
          }

          if ([string]::IsNullOrWhiteSpace($env:SELF_SIGNED_PFX_PASSWORD)) {
            throw 'Missing required secret: SELF_SIGNED_PFX_PASSWORD'
          }

      - name: Decode self-signed PFX
        shell: pwsh
        env:
          SELF_SIGNED_PFX_BASE64: ${{ secrets.SELF_SIGNED_PFX_BASE64 }}
        run: |
          New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE/out/windows/signing" -Force | Out-Null
          [System.IO.File]::WriteAllBytes(
            "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx",
            [System.Convert]::FromBase64String($env:SELF_SIGNED_PFX_BASE64)
          )

      - name: Build self-signed MSIX
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          PACKAGE_ARCHITECTURE: ${{ inputs.package_architecture }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: |
          $password = ConvertTo-SecureString -String $env:SELF_SIGNED_PFX_PASSWORD -AsPlainText -Force
          ./packaging/windows/New-SelfSignedCodexMsix.ps1 `
            -SourcePath "$env:GITHUB_WORKSPACE/codex" `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -CertificatePath "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" `
            -CertificatePassword $password `
            -OutputDirectory "$env:GITHUB_WORKSPACE/out/windows/self-signed" `
            -ExportCertificate

      - name: Generate App Installer file
        shell: pwsh
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          PACKAGE_ARCHITECTURE: ${{ inputs.package_architecture }}
          APPINSTALLER_URI: ${{ inputs.appinstaller_uri }}
        run: |
          $packageUri = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/Codex-$env:PACKAGE_ARCHITECTURE-self-signed.msix"
          ./packaging/windows/New-CodexAppInstaller.ps1 `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -PackageUri $packageUri `
            -AppInstallerUri $env:APPINSTALLER_URI `
            -HoursBetweenUpdateChecks 0 `
            -ShowPrompt $true `
            -UpdateBlocksActivation $false `
            -OutputPath "$env:GITHUB_WORKSPACE/out/windows/self-signed/release-assets/Codex.appinstaller"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-self-signed-msix
          path: out/windows/self-signed/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: codex-app windows self-signed ${{ inputs.tag_name }}
          draft: true
          files: out/windows/self-signed/release-assets/*
