name: Windows Self-Signed MSIX Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: GitHub release tag to publish assets to, for example v26.429.20946
        required: true
        type: string
      package_version:
        description: Four-part MSIX version, for example 26.429.20946.0
        required: true
        type: string
      package_name:
        description: MSIX package identity name
        required: true
        type: string
      package_publisher:
        description: MSIX publisher subject matching the self-signed PFX, for example CN=Codex Local Test
        required: true
        type: string
      appinstaller_uri:
        description: Stable public URL where Codex.appinstaller will be hosted
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-sign-publish:
    runs-on: windows-11-arm
    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      GH_TOKEN: ${{ github.token }}
      PACKAGE_ARCHITECTURE: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Resolve upstream release versions
        id: upstream
        working-directory: desktop
        run: node ./scripts/resolve-codex-releases.mjs

      - name: Restore Electron cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/electron
          key: windows-arm64-electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Restore hydrated release cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/codex-app
            desktop/.cache/codex-cli
            desktop/.cache/runtime-node-modules
          key: ${{ steps.upstream.outputs.hydration_cache_key }}

      - name: Validate self-signed signing inputs
        shell: pwsh
        env:
          SELF_SIGNED_PFX_BASE64: ${{ secrets.SELF_SIGNED_PFX_BASE64 }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SELF_SIGNED_PFX_BASE64)) {
            throw 'Missing required secret: SELF_SIGNED_PFX_BASE64'
          }

          if ([string]::IsNullOrWhiteSpace($env:SELF_SIGNED_PFX_PASSWORD)) {
            throw 'Missing required secret: SELF_SIGNED_PFX_PASSWORD'
          }

      - name: Decode self-signed PFX
        shell: pwsh
        env:
          SELF_SIGNED_PFX_BASE64: ${{ secrets.SELF_SIGNED_PFX_BASE64 }}
        run: |
          $pfxBytes = [System.Convert]::FromBase64String($env:SELF_SIGNED_PFX_BASE64 -replace '\s', '')
          New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE/out/windows/signing" -Force | Out-Null
          [System.IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx", $pfxBytes)

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows app payload
        shell: pwsh
        run: |
          Push-Location "$env:GITHUB_WORKSPACE/desktop"
          try {
            npm run package:win:arm64
          }
          finally {
            Pop-Location
          }

          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "desktop/out/Codex-win32-$env:PACKAGE_ARCHITECTURE"
          $entryPoint = Join-Path $packageRoot 'Codex.exe'
          if (-not (Test-Path -Path $entryPoint -PathType Leaf)) {
            throw "Electron Forge did not produce the expected Windows entrypoint: $entryPoint"
          }

          $payloadRoot = Join-Path $env:GITHUB_WORKSPACE 'codex'
          $payloadAppRoot = Join-Path $env:GITHUB_WORKSPACE 'codex/app'
          Remove-Item -Path $payloadAppRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $payloadAppRoot -Force | Out-Null
          Copy-Item -Path (Join-Path $packageRoot '*') -Destination $payloadAppRoot -Recurse -Force

          $assetsRoot = Join-Path $payloadRoot 'assets'
          New-Item -ItemType Directory -Path $assetsRoot -Force | Out-Null

          Add-Type -AssemblyName System.Drawing
          function New-LogoPng {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Path,
              [Parameter(Mandatory = $true)]
              [int] $Size
            )

            $bitmap = [System.Drawing.Bitmap]::new($Size, $Size)
            try {
              $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
              try {
                $graphics.Clear([System.Drawing.ColorTranslator]::FromHtml('#3143FF'))
              }
              finally {
                $graphics.Dispose()
              }

              $bitmap.Save($Path, [System.Drawing.Imaging.ImageFormat]::Png)
            }
            finally {
              $bitmap.Dispose()
            }
          }

          New-LogoPng -Path (Join-Path $assetsRoot 'icon.png') -Size 50
          New-LogoPng -Path (Join-Path $assetsRoot 'Square44x44Logo.png') -Size 44
          New-LogoPng -Path (Join-Path $assetsRoot 'Square150x150Logo.png') -Size 150

          @'
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities" xmlns:mp="http://schemas.microsoft.com/appx/2014/phone/manifest" IgnorableNamespaces="uap rescap">
            <Identity Name="OpenAI.Codex" ProcessorArchitecture="arm64" Version="0.0.0.0" Publisher="CN=Codex" />
            <Properties>
              <DisplayName>Codex</DisplayName>
              <PublisherDisplayName>OpenAI</PublisherDisplayName>
              <Logo>assets\icon.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.19041.0" MaxVersionTested="10.0.19041.0" />
            </Dependencies>
            <Resources>
              <Resource Language="en-US" />
            </Resources>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
              <Capability Name="internetClient" />
            </Capabilities>
            <Applications>
              <Application Id="App" Executable="app\Codex.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="Codex" Description="Codex" Square44x44Logo="assets\Square44x44Logo.png" Square150x150Logo="assets\Square150x150Logo.png" BackgroundColor="#3143FF" />
              </Application>
            </Applications>
            <mp:PhoneIdentity PhoneProductId="53bf120e-f20a-474e-892d-d87c803a0e39" PhonePublisherId="7d1e4745-d434-4fde-a9ef-c9c97f199413" />
          </Package>
          '@ | Set-Content -Path (Join-Path $payloadRoot 'AppxManifest.xml') -Encoding utf8

      - name: Build self-signed MSIX
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: |
          $password = ConvertTo-SecureString -String $env:SELF_SIGNED_PFX_PASSWORD -AsPlainText -Force
          ./packaging/windows/New-SelfSignedCodexMsix.ps1 `
            -SourcePath "$env:GITHUB_WORKSPACE/codex" `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -CertificatePath "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" `
            -CertificatePassword $password `
            -OutputDirectory "$env:GITHUB_WORKSPACE/out/windows/self-signed" `
            -ExportCertificate

      - name: Remove temporary PFX
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Path "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" -Force -ErrorAction SilentlyContinue

      - name: Generate App Installer file
        shell: pwsh
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          APPINSTALLER_URI: ${{ inputs.appinstaller_uri }}
        run: |
          $packageUri = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/Codex-$env:PACKAGE_ARCHITECTURE-self-signed.msix"
          ./packaging/windows/New-CodexAppInstaller.ps1 `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -PackageUri $packageUri `
            -AppInstallerUri $env:APPINSTALLER_URI `
            -HoursBetweenUpdateChecks 0 `
            -ShowPrompt $true `
            -UpdateBlocksActivation $false `
            -OutputPath "$env:GITHUB_WORKSPACE/out/windows/self-signed/release-assets/Codex.appinstaller"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-windows-self-signed-msix
          path: out/windows/self-signed/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ inputs.tag_name }}
          name: codex-app windows self-signed ${{ inputs.tag_name }}
          draft: true
          files: out/windows/self-signed/release-assets/*
