name: Windows ARM64 Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-arm64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Make Windows ARM64 ZIP
        working-directory: desktop
        run: npm run make:win:arm64

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-app-windows-arm64
          path: |
            desktop/out/make/zip/win32/arm64/*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: codex-app-windows-arm64 ${{ github.ref_name }}
          files: |
            desktop/out/make/zip/win32/arm64/*.zip
