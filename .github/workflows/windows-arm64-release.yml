    source,
    /const OFFICIAL_PACKAGE_FAMILY_NAME: &str = "OpenAI\.Codex_2p2nqsd0c76g0";/,
  );
  assert.match(source, /if package_family_name != OFFICIAL_PACKAGE_FAMILY_NAME \{/);
