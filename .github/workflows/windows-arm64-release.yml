name: Windows ARM64 Release Artifacts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build-windows-arm64:
    runs-on: windows-2025-vs2026
    env:
      IS_RELEASE_EVENT: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      PACKAGE_ARCHITECTURE: arm64
      PUBLISH_SELF_SIGNED_MSIX: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      electron_config_cache: ${{ github.workspace }}\.cache\electron
    concurrency:
      group: windows-arm64-release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Resolve upstream release versions
        id: upstream
        working-directory: desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types ./scripts/resolve-codex-releases.ts

      - name: Skip released commit
        if: steps.upstream.outputs.current_commit_release_tag != ''
        env:
          RELEASE_VERSION: ${{ steps.upstream.outputs.release_version }}
          CODEX_APP_BUILD: ${{ steps.upstream.outputs.codex_app_build }}
          CODEX_APPCAST_FEED: ${{ steps.upstream.outputs.codex_appcast_feed }}
          CODEX_CLI_TAG: ${{ steps.upstream.outputs.codex_cli_tag }}
          CODEX_PLUS_PLUS_TAG: ${{ steps.upstream.outputs.codex_plus_plus_tag }}
          CURRENT_COMMIT_RELEASE_TAG: ${{ steps.upstream.outputs.current_commit_release_tag }}
        run: |
          Write-Output "Codex app $env:RELEASE_VERSION build $env:CODEX_APP_BUILD from $env:CODEX_APPCAST_FEED with CLI $env:CODEX_CLI_TAG and Codex++ $env:CODEX_PLUS_PLUS_TAG already has repo release $env:CURRENT_COMMIT_RELEASE_TAG for this commit."

      - name: Restore npm cache
        if: steps.upstream.outputs.current_commit_release_tag == ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Restore Electron cache
        if: steps.upstream.outputs.current_commit_release_tag == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/electron
          key: windows-arm64-electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Install dependencies
        if: steps.upstream.outputs.current_commit_release_tag == ''
        working-directory: desktop
        run: npm ci

      - name: Build desktop scripts
        if: steps.upstream.outputs.current_commit_release_tag == ''
        working-directory: desktop
        run: npm run build:scripts

      - name: Run targeted desktop tests
        if: steps.upstream.outputs.current_commit_release_tag == ''
        working-directory: desktop
        run: npm run test:resolve-codex-releases:compiled && npm run test:windows-package-resources:compiled && npm run test:verify-browser-client-runtime:compiled

      - name: Restore hydrated release cache
        if: steps.upstream.outputs.current_commit_release_tag == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/codex-app
            desktop/.cache/codex-cli
          key: ${{ steps.upstream.outputs.hydration_cache_key }}

      - name: Prepare native Node module cache directory
        if: steps.upstream.outputs.current_commit_release_tag == ''
        run: New-Item -ItemType Directory -Force -Path desktop/.cache/runtime-node-modules | Out-Null

      - name: Restore native Node module cache
        if: steps.upstream.outputs.current_commit_release_tag == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: desktop/.cache/runtime-node-modules
          key: ${{ steps.upstream.outputs.native_modules_cache_key }}

      - name: Restore native updater cache
        if: steps.upstream.outputs.current_commit_release_tag == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/windows-oai-update-checker
            desktop/native/windows-oai-update-checker/target
            desktop/resources/native/windows-updater.node
          key: windows-oai-updater-${{ runner.os }}-${{ env.PACKAGE_ARCHITECTURE }}-${{ hashFiles('desktop/scripts/build-windows-oai-update-checker.ps1', 'desktop/native/windows-oai-update-checker/Cargo.lock', 'desktop/native/windows-oai-update-checker/Cargo.toml', 'desktop/native/windows-oai-update-checker/src/**') }}

      - name: Build Windows updater
        if: steps.upstream.outputs.current_commit_release_tag == ''
        working-directory: desktop
        run: npm run build:windows-oai-update-checker -- -Architecture arm64

      - name: Hydrate Windows ARM64 inputs
        if: steps.upstream.outputs.current_commit_release_tag == ''
        working-directory: desktop
        env:
          CODEX_APP_VERSION: ${{ steps.upstream.outputs.codex_app_version }}
          CODEX_APP_BUILD: ${{ steps.upstream.outputs.codex_app_build }}
          CODEX_APPCAST_FEED: ${{ steps.upstream.outputs.codex_appcast_feed }}
          CODEX_CLI_TAG: ${{ steps.upstream.o…21468 tokens truncated…e, /name: Build desktop scripts[\s\S]*run: npm run build:scripts/);
  assert.ok(prWorkflowSource.indexOf("name: Restore Electron cache") < prWorkflowSource.indexOf("name: Install dependencies"));
  assert.ok(releaseWorkflowSource.indexOf("name: Restore Electron cache") < releaseWorkflowSource.indexOf("name: Install dependencies"));
  assert.match(prWorkflowSource, /name: Build Windows updater[\s\S]*run: npm run build:windows-oai-update-checker -- -Architecture arm64/);
  assert.match(releaseWorkflowSource, /name: Build Windows updater[\s\S]*run: npm run build:windows-oai-update-checker -- -Architecture arm64/);
  assert.match(prWorkflowSource, /name: Hydrate Windows ARM64 inputs[\s\S]*CODEX_APP_VERSION: \$\{\{ steps\.upstream\.outputs\.codex_app_version \}\}[\s\S]*CODEX_APP_BUILD: \$\{\{ steps\.upstream\.outputs\.codex_app_build \}\}/);
  assert.match(releaseWorkflowSource, /name: Hydrate Windows ARM64 inputs[\s\S]*CODEX_APP_VERSION: \$\{\{ steps\.upstream\.outputs\.codex_app_version \}\}[\s\S]*CODEX_APP_BUILD: \$\{\{ steps\.upstream\.outputs\.codex_app_build \}\}/);
  assert.match(prWorkflowSource, /name: Hydrate Windows ARM64 inputs[\s\S]*CODEX_APPCAST_FEED: \$\{\{ steps\.upstream\.outputs\.codex_appcast_feed \}\}[\s\S]*GH_TOKEN: \$\{\{ github\.token \}\}[\s\S]*run: npm run hydrate:app:compiled -- --appcast-feed "\$env:CODEX_APPCAST_FEED" && npm run hydrate:cli:compiled/);
  assert.match(releaseWorkflowSource, /name: Hydrate Windows ARM64 inputs[\s\S]*CODEX_APPCAST_FEED: \$\{\{ steps\.upstream\.outputs\.codex_appcast_feed \}\}[\s\S]*GH_TOKEN: \$\{\{ github\.token \}\}[\s\S]*run: npm run hydrate:app:compiled -- --appcast-feed "\$env:CODEX_APPCAST_FEED" && npm run hydrate:cli:compiled/);
  assert.match(prWorkflowSource, /name: Verify Windows ARM64 inputs[\s\S]*run: npm run verify:browser-client-runtime:compiled/);
