name: Windows ARM64 Release Artifacts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build-windows-arm64:
    runs-on: windows-2025-vs2026
    env:
      IS_RELEASE_EVENT: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      PACKAGE_ARCHITECTURE: arm64
      PUBLISH_SELF_SIGNED_MSIX: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      electron_config_cache: ${{ github.workspace }}\.cache\electron
    concurrency:
      group: windows-arm64-release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Resolve upstream release versions
        id: upstream
        working-directory: desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types ./scripts/resolve-codex-releases.ts

      - name: Notice existing repo release
        if: steps.upstream.outputs.current_commit_release_tag != ''
        env:
          RELEASE_VERSION: ${{ steps.upstream.outputs.release_version }}
          CODEX_APP_BUILD: ${{ steps.upstream.outputs.codex_app_build }}
          CODEX_APPCAST_FEED: ${{ steps.upstream.outputs.codex_appcast_feed }}
          CODEX_CLI_TAG: ${{ steps.upstream.outputs.codex_cli_tag }}
          CODEX_PLUS_PLUS_TAG: ${{ steps.upstream.outputs.codex_plus_plus_tag }}
          CURRENT_COMMIT_RELEASE_TAG: ${{ steps.upstream.outputs.current_commit_release_tag }}
        run: |
          Write-Output "Codex app $env:RELEASE_VERSION build $env:CODEX_APP_BUILD from $env:CODEX_APPCAST_FEED with CLI $env:CODEX_CLI_TAG and Codex++ $env:CODEX_PLUS_PLUS_TAG already has repo release $env:CURRENT_COMMIT_RELEASE_TAG for this commit; continuing so later release and Pages steps can repair partial runs."

      - name: Restore npm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Restore Electron cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/electron
          key: windows-arm64-electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop scripts
        working-directory: desktop
        run: npm run build:scripts

      - name: Run targeted desktop tests
        working-directory: desktop
        run: npm run test:resolve-codex-releases:compiled && npm run test:hydrate-codex-cli:compiled && npm run test:windows-arm64-package-plan:compiled && npm run test:windows-package-resources:compiled && npm run test:verify-browser-client-runtime:compiled

      - name: Restore hydrated release cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/codex-app
            desktop/.cache/codex-cli
          key: ${{ steps.upstream.outputs.hydration_cache_key }}

      - name: Prepare native Node module cache directory
        run: New-Item -ItemType Directory -Force -Path desktop/.cache/runtime-node-modules | Out-Null

      - name: Restore native Node module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: desktop/.cache/runtime-node-modules
          key: ${{ steps.upstream.outputs.native_modules_cache_key }}

      - name: Restore native updater cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/windows-oai-update-checker
            desktop/native/windows-oai-update-checker/target
            desktop/resources/native/windows-updater.node
          key: windows-oai-updater-${{ runner.os }}-${{ env.PACKAGE_ARCHITECTURE }}-${{ hashFiles('desktop/scripts/build-windows-oai-update-checker.ps1', 'desktop/native/windows-oai-update-checker/Cargo.lock', 'desktop/native/windows-oai-update-checker/Cargo.toml', 'desktop/native/windows-oai-update-checker/src/**') }}

      - name: Make Windows ARM64 ZIP
        working-directory: desktop
        env:
          CODEX_APP_VERSION: ${{ steps.upstream.outputs.codex_app_version }}
          CODEX_APP_BUILD: ${{ steps.upstream.outputs.codex_app_build }}
          CODEX_APPCAST_FEED: ${{ steps.upstream.outputs.codex_appcast_feed }}
          CODEX_CLI_TAG: ${{ steps.upstream.outputs.codex_cli_tag }}
          CODEX_PLUS_PLUS_TAG: ${{ steps.upstream.outputs.codex_plus_plus_tag }}
          CODEX_PLUS_PLUS_SHA: ${{ steps.upstream.outputs.codex_plus_plus_sha }}
          GH_TOKEN: ${{ github.token }}
        run: npm run plan:win:arm64:compiled -- make

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-app-windows-arm64
          path: |
            desktop/out/make/zip/win32/arm64/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: env.IS_RELEASE_EVENT == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.upstream.outputs.release_tag }}
          CODEX_APP_VERSION: ${{ steps.upstream.outputs.codex_app_version }}
          CODEX_APP_BUILD: ${{ steps.upstream.outputs.codex_app_build }}
          CODEX_APPCAST_FEED: ${{ steps.upstream.outputs.codex_appcast_feed }}
          CODEX_CLI_TAG: ${{ steps.upstream.outputs.codex_cli_tag }}
          CODEX_PLUS_PLUS_TAG: ${{ steps.upstream.outputs.codex_plus_plus_tag }}
          CODEX_PLUS_PLUS_SHA: ${{ steps.upstream.outputs.codex_plus_plus_sha }}
        run: |
          $zip = Get-ChildItem -Path "desktop/out/make/zip/win32/arm64/*.zip" | Select-Object -First 1
          if ($null -eq $zip) {
            throw "No Windows ARM64 ZIP was produced."
          }

          $tag = $env:RELEASE_TAG
          $repo = $env:GITHUB_REPOSITORY
          $notes = @"
          Codex app: $env:CODEX_APP_VERSION build $env:CODEX_APP_BUILD
          Codex appcast: $env:CODEX_APPCAST_FEED
          Codex CLI: $env:CODEX_CLI_TAG
          Codex++: $env:CODEX_PLUS_PLUS_TAG
          Codex++ commit: $env:CODEX_PLUS_PLUS_SHA
          Commit: $env:GITHUB_SHA
          "@

          gh release view $tag --repo "$repo" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip.FullName --repo "$repo" --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload Windows ARM64 ZIP to existing release $tag."
            }

            gh release edit $tag --repo "$repo" --title "codex-app-windows-arm64 $tag" --notes "$notes"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update GitHub release $tag."
            }
          }
          else {
            gh release create $tag $zip.FullName --repo "$repo" --target "$env:GITHUB_SHA" --title "codex-app-windows-arm64 $tag" --notes "$notes"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $tag."
            }
          }

      - name: Validate self-signed MSIX inputs
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.upstream.outputs.release_version }}
          PACKAGE_NAME: ${{ vars.SELF_SIGNED_PACKAGE_NAME }}
          PACKAGE_PUBLISHER: ${{ vars.SELF_SIGNED_PACKAGE_PUBLISHER }}
          APPINSTALLER_URI: ${{ vars.SELF_SIGNED_APPINSTALLER_URI }}
          PAGES_BASE_URL: ${{ vars.SELF_SIGNED_PAGES_BASE_URL }}
          SELF_SIGNED_RELEASE_TAG: ${{ steps.upstream.outputs.release_tag }}
        run: |
          $missing = @()
          foreach ($name in @('PACKAGE_VERSION', 'PACKAGE_NAME', 'PACKAGE_PUBLISHER', 'APPINSTALLER_URI', 'PAGES_BASE_URL', 'SELF_SIGNED_RELEASE_TAG')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required self-signed MSIX input(s): $($missing -join ', ')"
          }

      - name: Decode self-signed PFX
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        working-directory: desktop
        env:
          SELF_SIGNED_PFX_BASE64: ${{ secrets.SELF_SIGNED_PFX_BASE64 }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: node ./.cache/scripts/decode-self-signed-pfx.js --output "${{ github.workspace }}\out\windows\signing\CodexSelfSigned.pfx"

      - name: Prepare self-signed MSIX payload
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        working-directory: desktop
        run: npm run prepare:self-signed-msix-payload:compiled -- --package-root "${{ github.workspace }}\desktop\out\Codex-win32-${{ env.PACKAGE_ARCHITECTURE }}" --output-root "${{ github.workspace }}\codex"

      - name: Build self-signed MSIX
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ vars.SELF_SIGNED_PACKAGE_NAME }}
          PACKAGE_PUBLISHER: ${{ vars.SELF_SIGNED_PACKAGE_PUBLISHER }}
          PACKAGE_VERSION: ${{ steps.upstream.outputs.release_version }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: |
          $password = ConvertTo-SecureString -String $env:SELF_SIGNED_PFX_PASSWORD -AsPlainText -Force
          ./packaging/windows/New-SelfSignedCodexMsix.ps1 `
            -SourcePath "$env:GITHUB_WORKSPACE/codex" `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -CertificatePath "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" `
            -CertificatePassword $password `
            -OutputDirectory "$env:GITHUB_WORKSPACE/out/windows/self-signed" `
            -ExportCertificate

      - name: Remove temporary PFX
        if: always() && env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        shell: pwsh
        run: |
          Remove-Item -Path "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" -Force -ErrorAction SilentlyContinue

      - name: Generate self-signed App Installer file
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        working-directory: desktop
        env:
          PACKAGE_NAME: ${{ vars.SELF_SIGNED_PACKAGE_NAME }}
          PACKAGE_PUBLISHER: ${{ vars.SELF_SIGNED_PACKAGE_PUBLISHER }}
          PACKAGE_VERSION: ${{ steps.upstream.outputs.release_version }}
          APPINSTALLER_URI: ${{ vars.SELF_SIGNED_APPINSTALLER_URI }}
          PAGES_BASE_URL: ${{ vars.SELF_SIGNED_PAGES_BASE_URL }}
          PACKAGE_URI: ${{ vars.SELF_SIGNED_PAGES_BASE_URL }}/Codex-${{ env.PACKAGE_ARCHITECTURE }}-self-signed.msix
        run: npm run write:self-signed-appinstaller:compiled -- --architecture "${{ env.PACKAGE_ARCHITECTURE }}" --output "${{ github.workspace }}\out\windows\self-signed\release-assets\Codex.appinstaller"

      - name: Upload self-signed MSIX artifacts
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-windows-self-signed-msix
          path: out/windows/self-signed/release-assets/*
          if-no-files-found: error

      - name: Publish self-signed GitHub release assets
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SELF_SIGNED_RELEASE_TAG: ${{ steps.upstream.outputs.release_tag }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          gh release view $env:SELF_SIGNED_RELEASE_TAG --repo "$repo" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:SELF_SIGNED_RELEASE_TAG --repo "$repo" --target "$env:GITHUB_SHA" --title "codex-app windows self-signed $env:SELF_SIGNED_RELEASE_TAG" --draft
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create self-signed release $env:SELF_SIGNED_RELEASE_TAG."
            }
          }

          gh release upload $env:SELF_SIGNED_RELEASE_TAG out/windows/self-signed/release-assets/* --repo "$repo" --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload self-signed release assets to $env:SELF_SIGNED_RELEASE_TAG."
          }

      - name: Archive self-signed Pages artifact
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        shell: bash
        env:
          INPUT_PATH: out/windows/self-signed/release-assets
        run: |
          echo ::group::Archive artifact
          tar \
            --dereference --hard-dereference \
            --directory "$INPUT_PATH" \
            -cvf "$RUNNER_TEMP\artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=.[^/]* \
            --force-local \
            "."
          echo ::endgroup::

      - name: Upload self-signed Pages artifact
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy self-signed update channel to Pages
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages
