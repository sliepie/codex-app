name: Windows ARM64 Release Artifacts

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      publish_self_signed_msix:
        description: Build and publish a self-signed MSIX alongside the ARM64 artifact
        required: false
        default: false
        type: boolean
      package_version:
        description: Four-part MSIX version, for example 26.429.20946.0
        required: false
        type: string
      package_name:
        description: MSIX package identity name
        required: false
        type: string
      package_publisher:
        description: MSIX publisher subject matching the self-signed PFX, for example CN=Codex Local Test
        required: false
        type: string
      appinstaller_uri:
        description: Stable public URL where Codex.appinstaller will be hosted
        required: false
        type: string
      self_signed_release_tag:
        description: GitHub release tag to publish self-signed assets to, for example v26.429.20946
        required: false
        type: string
  push:
    branches:
      - "**"

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build-windows-arm64:
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      GH_TOKEN: ${{ github.token }}
      IS_RELEASE_EVENT: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      PACKAGE_ARCHITECTURE: arm64
      PUBLISH_SELF_SIGNED_MSIX: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.publish_self_signed_msix) }}
    concurrency:
      group: windows-arm64-release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Resolve upstream release versions
        id: upstream
        working-directory: desktop
        run: node ./scripts/resolve-codex-releases.mjs

      - name: Check build marker
        id: build-marker
        if: env.IS_RELEASE_EVENT == 'true'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .github/build-markers/windows-arm64
          key: ${{ steps.upstream.outputs.build_marker_key }}
          lookup-only: true

      - name: Skip unchanged release
        if: env.IS_RELEASE_EVENT == 'true' && steps.build-marker.outputs.cache-hit == 'true'
        run: |
          Write-Output "Codex app ${{ steps.upstream.outputs.codex_app_version }} build ${{ steps.upstream.outputs.codex_app_build }} with CLI ${{ steps.upstream.outputs.codex_cli_tag }} was already built."

      - name: Restore Electron cache
        if: env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/electron
          key: windows-arm64-electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Restore hydrated release cache
        if: env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/codex-app
            desktop/.cache/codex-cli
            desktop/.cache/runtime-node-modules
          key: ${{ steps.upstream.outputs.hydration_cache_key }}

      - name: Install dependencies
        if: env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true'
        working-directory: desktop
        run: npm ci

      - name: Make Windows ARM64 ZIP
        if: env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true'
        working-directory: desktop
        run: npm run make:win:arm64:ci

      - name: Upload Windows ARM64 artifact
        if: env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-app-windows-arm64
          path: |
            desktop/out/make/zip/win32/arm64/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: env.IS_RELEASE_EVENT == 'true' && steps.build-marker.outputs.cache-hit != 'true'
        run: |
          $zip = Get-ChildItem -Path "desktop/out/make/zip/win32/arm64/*.zip" | Select-Object -First 1
          if ($null -eq $zip) {
            throw "No Windows ARM64 ZIP was produced."
          }

          $tag = "${{ steps.upstream.outputs.release_tag }}"
          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip.FullName --repo "${{ github.repository }}" --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload Windows ARM64 ZIP to existing release $tag."
            }
          }
          else {
            gh release create $tag $zip.FullName --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "codex-app-windows-arm64 $tag"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $tag."
            }
          }

      - name: Validate self-signed MSIX inputs
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ inputs.package_version || format('{0}.0', steps.upstream.outputs.codex_app_version) }}
          PACKAGE_NAME: ${{ inputs.package_name || vars.SELF_SIGNED_PACKAGE_NAME }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher || vars.SELF_SIGNED_PACKAGE_PUBLISHER }}
          APPINSTALLER_URI: ${{ inputs.appinstaller_uri || vars.SELF_SIGNED_APPINSTALLER_URI }}
          PAGES_BASE_URL: ${{ vars.SELF_SIGNED_PAGES_BASE_URL }}
          SELF_SIGNED_RELEASE_TAG: ${{ inputs.self_signed_release_tag || steps.upstream.outputs.release_tag }}
        run: |
          $missing = @()
          foreach ($name in @('PACKAGE_VERSION', 'PACKAGE_NAME', 'PACKAGE_PUBLISHER', 'APPINSTALLER_URI', 'PAGES_BASE_URL', 'SELF_SIGNED_RELEASE_TAG')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required self-signed MSIX input(s): $($missing -join ', ')"
          }

      - name: Decode self-signed PFX
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        working-directory: desktop
        env:
          SELF_SIGNED_PFX_BASE64: ${{ secrets.SELF_SIGNED_PFX_BASE64 }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: npm run decode:self-signed-pfx -- --output "${{ github.workspace }}\out\windows\signing\CodexSelfSigned.pfx"

      - name: Prepare self-signed MSIX payload
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        working-directory: desktop
        run: npm run prepare:self-signed-msix-payload -- --package-root "${{ github.workspace }}\desktop\out\Codex-win32-${{ env.PACKAGE_ARCHITECTURE }}" --output-root "${{ github.workspace }}\codex"

      - name: Build self-signed MSIX
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ inputs.package_name || vars.SELF_SIGNED_PACKAGE_NAME }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher || vars.SELF_SIGNED_PACKAGE_PUBLISHER }}
          PACKAGE_VERSION: ${{ inputs.package_version || format('{0}.0', steps.upstream.outputs.codex_app_version) }}
          SELF_SIGNED_PFX_PASSWORD: ${{ secrets.SELF_SIGNED_PFX_PASSWORD }}
        run: |
          $password = ConvertTo-SecureString -String $env:SELF_SIGNED_PFX_PASSWORD -AsPlainText -Force
          ./packaging/windows/New-SelfSignedCodexMsix.ps1 `
            -SourcePath "$env:GITHUB_WORKSPACE/codex" `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -CertificatePath "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" `
            -CertificatePassword $password `
            -OutputDirectory "$env:GITHUB_WORKSPACE/out/windows/self-signed" `
            -ExportCertificate

      - name: Remove temporary PFX
        if: always() && env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        shell: pwsh
        run: |
          Remove-Item -Path "$env:GITHUB_WORKSPACE/out/windows/signing/CodexSelfSigned.pfx" -Force -ErrorAction SilentlyContinue

      - name: Generate self-signed App Installer file
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        working-directory: desktop
        env:
          PACKAGE_NAME: ${{ inputs.package_name || vars.SELF_SIGNED_PACKAGE_NAME }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher || vars.SELF_SIGNED_PACKAGE_PUBLISHER }}
          PACKAGE_VERSION: ${{ inputs.package_version || format('{0}.0', steps.upstream.outputs.codex_app_version) }}
          APPINSTALLER_URI: ${{ inputs.appinstaller_uri || vars.SELF_SIGNED_APPINSTALLER_URI }}
          PAGES_BASE_URL: ${{ vars.SELF_SIGNED_PAGES_BASE_URL }}
        run: npm run write:self-signed-appinstaller -- --package-name "$env:PACKAGE_NAME" --publisher "$env:PACKAGE_PUBLISHER" --version "$env:PACKAGE_VERSION" --architecture "${{ env.PACKAGE_ARCHITECTURE }}" --package-uri "$env:PAGES_BASE_URL/Codex-${{ env.PACKAGE_ARCHITECTURE }}-self-signed.msix" --appinstaller-uri "$env:APPINSTALLER_URI" --output "${{ github.workspace }}\out\windows\self-signed\release-assets\Codex.appinstaller"

      - name: Upload self-signed MSIX artifacts
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-windows-self-signed-msix
          path: out/windows/self-signed/release-assets/*
          if-no-files-found: error

      - name: Upload self-signed Pages artifact
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && env.IS_RELEASE_EVENT == 'true' && steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: out/windows/self-signed/release-assets

      - name: Deploy self-signed update channel to Pages
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && env.IS_RELEASE_EVENT == 'true' && steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        with:
          artifact_name: github-pages

      - name: Publish self-signed GitHub release assets
        if: env.PUBLISH_SELF_SIGNED_MSIX == 'true' && (env.IS_RELEASE_EVENT != 'true' || steps.build-marker.outputs.cache-hit != 'true')
        env:
          SELF_SIGNED_RELEASE_TAG: ${{ inputs.self_signed_release_tag || steps.upstream.outputs.release_tag }}
        run: |
          gh release view $env:SELF_SIGNED_RELEASE_TAG --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:SELF_SIGNED_RELEASE_TAG --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "codex-app windows self-signed $env:SELF_SIGNED_RELEASE_TAG" --draft
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create self-signed release $env:SELF_SIGNED_RELEASE_TAG."
            }
          }

          gh release upload $env:SELF_SIGNED_RELEASE_TAG out/windows/self-signed/release-assets/* --repo "${{ github.repository }}" --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload self-signed release assets to $env:SELF_SIGNED_RELEASE_TAG."
          }

      - name: Write build marker
        if: env.IS_RELEASE_EVENT == 'true' && steps.build-marker.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path .github/build-markers/windows-arm64 | Out-Null
          @{
            codexAppVersion = "${{ steps.upstream.outputs.codex_app_version }}"
            codexAppBuild = "${{ steps.upstream.outputs.codex_app_build }}"
            codexCliTag = "${{ steps.upstream.outputs.codex_cli_tag }}"
            runId = "${{ github.run_id }}"
          } | ConvertTo-Json | Set-Content -Path .github/build-markers/windows-arm64/latest.json

      - name: Save build marker
        if: env.IS_RELEASE_EVENT == 'true' && steps.build-marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .github/build-markers/windows-arm64
          key: ${{ steps.upstream.outputs.build_marker_key }}
