name: Windows ARM64 Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-arm64:
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Package Windows ARM64 app
        working-directory: desktop
        run: npm run package:win:arm64

      - name: Create Windows ARM64 ZIP
        working-directory: desktop
        shell: pwsh
        env:
          CODEX_RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.run_number) }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${env:CODEX_RELEASE_VERSION}" -replace "^v", ""
          $env:CODEX_RELEASE_VERSION = $version
          npm run zip:win:arm64

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-app-windows-arm64
          path: |
            desktop/out/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: codex-app-windows-arm64 ${{ github.ref_name }}
          files: |
            desktop/out/release-assets/*
