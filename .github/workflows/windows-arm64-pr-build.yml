name: Windows ARM64 PR Build

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/windows-arm64-pr-build.yml"
      - ".github/workflows/windows-arm64-release.yml"
      - ".node-version"
      - ".agents/skills/**"
      - "desktop/**"
      - "!desktop/scripts/build-primary-runtime-win-arm64.ts"
      - "!desktop/scripts/publish-primary-runtime-release.ts"
      - "!desktop/scripts/resolve-primary-runtime-source.ts"

permissions:
  contents: read

jobs:
  build-windows-arm64:
    runs-on: windows-2025-vs2026
    outputs:
      codex_app_version: ${{ steps.upstream.outputs.codex_app_version }}
      codex_app_build: ${{ steps.upstream.outputs.codex_app_build }}
      codex_cli_tag: ${{ steps.upstream.outputs.codex_cli_tag }}
    env:
      PACKAGE_ARCHITECTURE: arm64
      electron_config_cache: ${{ github.workspace }}\.cache\electron
    concurrency:
      group: windows-arm64-pr-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Resolve upstream release versions
        id: upstream
        working-directory: desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types ./scripts/resolve-codex-releases.ts

      - name: Restore Electron cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/electron
          key: windows-arm64-electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop scripts
        working-directory: desktop
        run: npm run build:scripts

      - name: Run targeted desktop tests
        working-directory: desktop
        run: npm run verify:skills:compiled && npm run test:verify-skills:compiled && npm run test:resolve-codex-releases:compiled && npm run test:hydrate-codex-cli:compiled && npm run test:windows-arm64-package-plan:compiled && npm run test:windows-package-resources:compiled && npm run test:verify-browser-client-runtime:compiled

      - name: Restore hydrated release cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/codex-app
            desktop/.cache/codex-cli
          key: ${{ steps.upstream.outputs.hydration_cache_key }}

      - name: Prepare native Node module cache directory
        run: New-Item -ItemType Directory -Force -Path desktop/.cache/runtime-node-modules | Out-Null

      - name: Restore native Node module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: desktop/.cache/runtime-node-modules
          key: ${{ steps.upstream.outputs.native_modules_cache_key }}

      - name: Restore native updater cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/windows-oai-update-checker
            desktop/native/windows-oai-update-checker/target
            desktop/resources/native/windows-updater.node
          key: windows-oai-updater-${{ runner.os }}-${{ env.PACKAGE_ARCHITECTURE }}-${{ hashFiles('desktop/scripts/build-windows-oai-update-checker.ps1', 'desktop/native/windows-oai-update-checker/Cargo.lock', 'desktop/native/windows-oai-update-checker/Cargo.toml', 'desktop/native/windows-oai-update-checker/src/**') }}

      - name: Build Windows ARM64 ZIP
        working-directory: desktop
        env:
          CODEX_APP_VERSION: ${{ steps.upstream.outputs.codex_app_version }}
          CODEX_APP_BUILD: ${{ steps.upstream.outputs.codex_app_build }}
          CODEX_CLI_TAG: ${{ steps.upstream.outputs.codex_cli_tag }}
          GH_TOKEN: ${{ github.token }}
        run: npm run plan:win:arm64:compiled -- make

      - name: Upload Windows ARM64 PR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-app-windows-arm64-pr
          path: |
            desktop/out/make/zip/win32/arm64/*.zip
          retention-days: 7
          if-no-files-found: error

  publish-alpha-release:
    needs: build-windows-arm64
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false
    runs-on: windows-2025-vs2026
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      ALPHA_RELEASE_TAG: codex-app-alpha
      ALPHA_RELEASE_TITLE: Codex app Windows ARM64 alpha
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      BUILD_SHA: ${{ github.sha }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      CODEX_APP_VERSION: ${{ needs.build-windows-arm64.outputs.codex_app_version }}
      CODEX_APP_BUILD: ${{ needs.build-windows-arm64.outputs.codex_app_build }}
      CODEX_CLI_TAG: ${{ needs.build-windows-arm64.outputs.codex_cli_tag }}
    concurrency:
      group: windows-arm64-pr-alpha-release
      cancel-in-progress: false

    steps:
      - name: Download Windows ARM64 PR artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: codex-app-windows-arm64-pr
          path: out/pr-alpha

      - name: Publish alpha GitHub release
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "out/pr-alpha" -Filter "*.zip" -Recurse | Select-Object -First 1
          if ($null -eq $zip) {
            throw "No Windows ARM64 ZIP was downloaded."
          }

          $tag = $env:ALPHA_RELEASE_TAG
          $targetSha = $env:BUILD_SHA
          $repo = $env:GITHUB_REPOSITORY
          $notes = @"
          Mutable alpha artifact for the latest successful same-repository PR build.

          PR: #$env:PR_NUMBER $env:PR_TITLE
          Branch: $env:PR_BRANCH
          Commit: $targetSha
          Workflow run: $env:WORKFLOW_RUN_URL
          Upstream Codex app: $env:CODEX_APP_VERSION build $env:CODEX_APP_BUILD
          Codex CLI: $env:CODEX_CLI_TAG
          "@

          gh release view $tag --repo "$repo" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh api --method PATCH "repos/$repo/git/refs/tags/$tag" -f "sha=$targetSha" -F force=true
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to move alpha release tag $tag to $targetSha."
            }

            gh release edit $tag --repo "$repo" --target "$targetSha" --title "$env:ALPHA_RELEASE_TITLE" --notes "$notes" --prerelease --latest=false
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update alpha release $tag."
            }
          }
          else {
            gh release create $tag --repo "$repo" --target "$targetSha" --title "$env:ALPHA_RELEASE_TITLE" --notes "$notes" --prerelease --latest=false
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create alpha release $tag."
            }
          }

          gh release upload $tag $zip.FullName --repo "$repo" --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload Windows ARM64 ZIP to alpha release $tag."
          }
