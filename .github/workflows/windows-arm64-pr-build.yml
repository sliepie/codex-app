name: Windows ARM64 PR Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows-arm64:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PACKAGE_ARCHITECTURE: arm64
      electron_config_cache: ${{ github.workspace }}\.cache\electron
    concurrency:
      group: windows-arm64-pr-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Resolve upstream release versions
        id: upstream
        working-directory: desktop
        run: node ./scripts/resolve-codex-releases.mjs

      - name: Restore Electron cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/electron
          key: windows-arm64-electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Restore hydrated release cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/codex-app
            desktop/.cache/codex-cli
            desktop/.cache/runtime-node-modules
          key: ${{ steps.upstream.outputs.hydration_cache_key }}

      - name: Restore native updater cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            desktop/.cache/windows-oai-update-checker
            desktop/native/windows-oai-update-checker/target
            desktop/resources/native/windows-updater.node
          key: windows-oai-updater-${{ runner.os }}-${{ env.PACKAGE_ARCHITECTURE }}-${{ hashFiles('desktop/scripts/build-windows-oai-update-checker.ps1', 'desktop/native/windows-oai-update-checker/Cargo.lock', 'desktop/native/windows-oai-update-checker/Cargo.toml', 'desktop/native/windows-oai-update-checker/src/**') }}

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Prepare and verify Windows ARM64 inputs
        working-directory: desktop
        env:
          CODEX_CLI_TAG: ${{ steps.upstream.outputs.codex_cli_tag }}
        run: npm run prepare:win:arm64

      - name: Build Windows ARM64 ZIP
        working-directory: desktop
        run: npm run make:win:arm64:compiled
