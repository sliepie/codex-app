name: Windows MSIX Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: GitHub release tag to publish assets to, for example v26.429.20946
        required: true
        type: string
      package_version:
        description: Four-part MSIX version, for example 26.429.20946.0
        required: true
        type: string
      package_architecture:
        description: MSIX processor architecture for the manifest
        required: true
        type: choice
        options:
          - x64
          - arm64
      package_name:
        description: MSIX package identity name
        required: true
        type: string
      package_publisher:
        description: MSIX publisher subject copied exactly from the Artifact Signing certificate profile
        required: true
        type: string
      appinstaller_uri:
        description: Stable public URL where Codex.appinstaller will be hosted
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-sign-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure Artifact Signing inputs
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        run: |
          $required = @(
            'AZURE_TENANT_ID',
            'AZURE_CLIENT_ID',
            'AZURE_CLIENT_SECRET',
            'AZURE_TRUSTED_SIGNING_ENDPOINT',
            'AZURE_CODE_SIGNING_NAME',
            'AZURE_CERT_PROFILE_NAME'
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing required secret: $name"
            }
          }

      - name: Stage package payload
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          PACKAGE_ARCHITECTURE: ${{ inputs.package_architecture }}
        run: |
          if ($env:PACKAGE_VERSION -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "package_version '$env:PACKAGE_VERSION' must be a four-part MSIX version."
          }

          $stageRoot = Join-Path $env:GITHUB_WORKSPACE 'out/windows/stage/codex'
          $assetRoot = Join-Path $env:GITHUB_WORKSPACE 'out/windows/release-assets'
          New-Item -ItemType Directory -Path $stageRoot -Force | Out-Null
          New-Item -ItemType Directory -Path $assetRoot -Force | Out-Null

          Copy-Item -Path "$env:GITHUB_WORKSPACE/codex/*" -Destination $stageRoot -Recurse -Force

          $entryPoint = Join-Path $stageRoot 'app/Codex.exe'
          if (-not (Test-Path -Path $entryPoint -PathType Leaf)) {
            throw "Cannot create MSIX: AppxManifest.xml declares app\Codex.exe, but the staged payload does not contain it. Hydrate a complete Windows payload before running this workflow."
          }

          Remove-Item -Path (Join-Path $stageRoot 'AppxSignature.p7x') -Force -ErrorAction SilentlyContinue
          Remove-Item -Path (Join-Path $stageRoot 'AppxBlockMap.xml') -Force -ErrorAction SilentlyContinue
          Remove-Item -Path (Join-Path $stageRoot 'AppxMetadata/CodeIntegrity.cat') -Force -ErrorAction SilentlyContinue

          $manifestPath = Join-Path $stageRoot 'AppxManifest.xml'
          [xml] $manifest = Get-Content -Path $manifestPath
          $identity = $manifest.Package.Identity
          $identity.Name = $env:PACKAGE_NAME
          $identity.Publisher = $env:PACKAGE_PUBLISHER
          $identity.Version = $env:PACKAGE_VERSION
          $identity.ProcessorArchitecture = $env:PACKAGE_ARCHITECTURE
          $manifest.Save($manifestPath)

      - name: Pack unsigned MSIX
        shell: pwsh
        run: |
          $makeAppx = Get-ChildItem -Path "${env:ProgramFiles(x86)}/Windows Kits/10/bin" -Filter makeappx.exe -Recurse |
            Where-Object { $_.FullName -like '*\x64\makeappx.exe' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if ($null -eq $makeAppx) {
            throw 'makeappx.exe was not found on the runner.'
          }

          $msixPath = Join-Path $env:GITHUB_WORKSPACE 'out/windows/release-assets/Codex-${{ inputs.package_architecture }}.msix'
          & $makeAppx.FullName pack /d "$env:GITHUB_WORKSPACE/out/windows/stage/codex" /p $msixPath /o
          if ($LASTEXITCODE -ne 0) {
            throw "makeappx failed with exit code $LASTEXITCODE"
          }

      - name: Sign MSIX with Azure Artifact Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\out\windows\release-assets
          files-folder-filter: msix

      - name: Generate App Installer file
        shell: pwsh
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          PACKAGE_PUBLISHER: ${{ inputs.package_publisher }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          PACKAGE_ARCHITECTURE: ${{ inputs.package_architecture }}
          APPINSTALLER_URI: ${{ inputs.appinstaller_uri }}
        run: |
          $packageUri = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/Codex-$env:PACKAGE_ARCHITECTURE.msix"
          ./packaging/windows/New-CodexAppInstaller.ps1 `
            -PackageName $env:PACKAGE_NAME `
            -Publisher $env:PACKAGE_PUBLISHER `
            -Version $env:PACKAGE_VERSION `
            -Architecture $env:PACKAGE_ARCHITECTURE `
            -PackageUri $packageUri `
            -AppInstallerUri $env:APPINSTALLER_URI `
            -HoursBetweenUpdateChecks 0 `
            -ShowPrompt $true `
            -UpdateBlocksActivation $false `
            -OutputPath "$env:GITHUB_WORKSPACE/out/windows/release-assets/Codex.appinstaller"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-msix
          path: out/windows/release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: codex-app windows ${{ inputs.tag_name }}
          draft: true
          files: out/windows/release-assets/*
